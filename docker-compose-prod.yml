services:
  mysql:
    image: mysql:8.0
    container_name: prj-mysql
    restart: always
    environment:
      MYSQL_DATABASE: prj_entrades
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    networks:
      - prj-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend-api:
    build:
      context: ./src/backend-api
    container_name: prj-backend-api
    restart: always
    volumes:
      - ./src/backend-api:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: sh -c "composer install --no-dev && ( [ ! -f .env ] && cp .env.example .env || true ) && (grep -q 'APP_KEY=base64' .env || php artisan key:generate --force) && until php artisan migrate --force; do echo 'Waiting for database...'; sleep 2; done && php artisan serve --host=0.0.0.0 --port=8000"
    networks:
      - prj-network

  backend-ws:
    image: node:24
    container_name: prj-backend-ws
    restart: always
    volumes:
      - ./src/backend-ws:/app
    working_dir: /app
    depends_on:
      - mysql
    command: sh -c "npm install && node server.js"
    ports:
      - "4000:4000"
    networks:
      - prj-network

  frontend:
    image: node:24
    container_name: prj-frontend
    restart: always
    volumes:
      - ./src/frontend:/app
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - NUXT_PUBLIC_API_BASE=https://prj-entrades-polmolmun.daw.inspedralbes.cat/api
      - NUXT_PUBLIC_SOCKET_URL=https://prj-entrades-polmolmun.daw.inspedralbes.cat
    command: sh -c "npm install && npm run build && node .output/server/index.mjs"
    networks:
      - prj-network

networks:
  prj-network:
    driver: bridge
