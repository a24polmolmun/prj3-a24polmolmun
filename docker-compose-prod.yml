services:
  mysql:
    image: mysql:8.0
    container_name: prj-mysql
    restart: always
    environment:
      MYSQL_DATABASE: prj_entrades
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    networks:
      - prj-network

  backend-api:
    build:
      context: ./src/backend-api
    container_name: prj-backend-api
    restart: always
    volumes:
      - ./src/backend-api:/var/www/html
    depends_on:
      - mysql
    ports:
      - "8000:8000"
    command: sh -c "composer install --no-dev && php artisan key:generate --force --no-interaction && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"
    networks:
      - prj-network

  backend-ws:
    image: node:24
    container_name: prj-backend-ws
    restart: always
    volumes:
      - ./src/backend-ws:/app
    working_dir: /app
    depends_on:
      - mysql
    command: sh -c "npm install && node server.js"
    ports:
      - "4000:4000"
    networks:
      - prj-network

  frontend:
    image: node:24
    container_name: prj-frontend
    restart: always
    volumes:
      - ./src/frontend:/app
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - NUXT_PUBLIC_API_BASE=http://prj-entrades-polmolmun.daw.inspedralbes.cat:8000/api
      - NUXT_PUBLIC_SOCKET_URL=http://prj-entrades-polmolmun.daw.inspedralbes.cat:4000
    command: sh -c "npm install && npm run build && node .output/server/index.mjs"
    networks:
      - prj-network

networks:
  prj-network:
    driver: bridge
